# ============================================================
# XHS Agent 配置文件 (Mac + Java)
# ============================================================

# 【核心】用自然语言描述你想找的内容
requirement: "帮我查找想要给自己宠物猫买猫粮的视频或者帖子"

# 搜索关键词（Agent 轮流搜索）
keywords:
  - "宠物猫粮推荐"
  - "猫咪主食推荐"
  - "小宠食品测评"
  - "宠物用品分享"

# Claude API ─────────────────────────────────────────────────
claude:
  apiKey: "******" # 填写 newapi.tsingyuai.com 平台的 Key
  apiUrl: "******" # OpenAI 兼容接口地址
  model: "claude-haiku-4-5-20251001" # 填写平台支持的模型名，登录平台后在模型列表中确认
  matchThreshold: 60
  maxTokens: 300

# 飞书配置 ─────────────────────────────────────────────────
feishu:
  enabled: false
  webhookUrl: "https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_TOKEN"
  appId: "YOUR_APP_ID"
  appSecret: "YOUR_APP_SECRET"
  appToken: "YOUR_BITABLE_APP_TOKEN"
  tableId: "YOUR_TABLE_ID"
  authUrl: "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal"
  bitableBatchCreateUrl: "https://open.feishu.cn/open-apis/bitable/v1/apps/{app}/tables/{table}/records/batch_create"

# 抖音配置 ─────────────────────────────────────────────────
douyin:
  enabled: true
  cooldownMinutes: 3

# 调度配置 ────────────────────────────────────────────────
schedule:
  crawlIntervalMinutes: 30 # 采集轮次间隔：首轮完成后，每隔多少分钟再抓一轮
  csvExportIntervalHours: 6 # CSV 定时导出间隔：运行中每隔多少小时导出一次
  feishuSyncIntervalMinutes: 5 # 飞书同步间隔：开启飞书后，每隔多少分钟推送未同步数据
  maxPostsPerKeyword: 100 # 单个平台、单个关键词、单轮采集最多抓取多少条原始帖子
  startupDelaySeconds: 3 # 启动缓冲时间：程序启动后，首轮采集前先等待多少秒

# 评论任务配置 ─────────────────────────────────────────────
comments:
  enabled: true
  latestCsvOnly: true # true = 每个平台只读取最新一个 CSV；false = 读取该平台所有 CSV
  maxPerPlatform: 1 # 0 = 不限制；大于0时，每个平台最多评论这么多条链接
  xiaohongshu:
    enabled: false
    content: "感谢分享，内容很有帮助。"
  douyin:
    enabled: true
    content: "感谢分享。"

# 浏览器配置 ──────────────────────────────────────────────
browser:
  headless: false # false = 显示浏览器窗口（首次登录时设为false）
  locale: "zh-CN"
  viewportWidth: 1280
  viewportHeight: 900
  minDelayMs: 1500
  maxDelayMs: 4000
  saveSession: true
  sessionFile: "data/session.json"
  xhsSessionFile: "data/session_xhs.json"
  douyinSessionFile: "data/session_douyin.json"
  profileDir: "data/browser-profile"

# 数据存储 ────────────────────────────────────────────────
storage:
  dbPath: "data/posts.db"
  csvOutputDir: "data/exports"
  dedupDays: 7

# 日志配置 ────────────────────────────────────────────────
logging:
  level: "INFO"
  file: "data/agent.log"
